<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sirkil – User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
              brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 font-sans text-slate-800 min-h-screen">

    <!-- PASSWORD GATE -->
    <div id="gate-section" class="flex items-center justify-center min-h-screen">
      <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-brand-50 mb-4">
            <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          </div>
          <h2 class="text-2xl font-bold text-slate-900">User Management</h2>
          <p class="text-slate-500 text-sm mt-2">Enter the admin access key to continue.</p>
        </div>
        <div class="space-y-4">
          <input type="password" id="gate-password" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Access Key" />
          <button id="gate-btn" class="w-full bg-brand-600 text-white font-medium p-3 rounded-lg hover:bg-brand-700 transition">Unlock</button>
          <p id="gate-error" class="text-red-500 text-sm text-center hidden">Incorrect key. Try again.</p>
        </div>
      </div>
    </div>

    <!-- MAIN DASHBOARD (hidden until password is correct) -->
    <div id="dashboard-section" class="hidden min-h-screen flex flex-col">
      <!-- Top Nav -->
      <nav class="bg-white border-b border-slate-200 px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-md bg-brand-600 text-white flex items-center justify-center font-bold">U</div>
          <h1 class="text-xl font-bold text-slate-900">User Management</h1>
        </div>
        <div class="flex items-center gap-4">
          <a href="/" class="text-sm font-medium text-brand-600 hover:underline bg-brand-50 px-3 py-1 rounded-full border border-brand-200">← Operations Control</a>
          <button id="lock-btn" class="text-sm font-medium text-slate-600 hover:text-red-600 transition">Lock</button>
        </div>
      </nav>

      <!-- Content -->
      <div class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">

        <!-- Create Account Card -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
          <h2 class="text-lg font-bold text-slate-900 mb-1">Create New Account</h2>
          <p class="text-sm text-slate-500 mb-5">After creating, share the email and password directly with the user.</p>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
              <input type="text" id="new-user-name" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none" placeholder="e.g. Ahmed Tanany">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
              <input type="email" id="new-user-email" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none" placeholder="user@sirkil.com">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
              <input type="text" id="new-user-password" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none" placeholder="Set a strong password">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
              <select id="new-user-role" class="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none bg-white">
                <option value="User">User (Mobile App Access)</option>
                <option value="Admin">Admin (Admin Panel Access)</option>
              </select>
            </div>
          </div>
          <div class="mt-4 flex items-center gap-4">
            <button id="create-user-btn" class="bg-slate-900 text-white font-medium px-6 py-2.5 rounded-lg hover:bg-slate-800 transition">Create Account</button>
            <p id="create-msg" class="text-sm hidden"></p>
          </div>
        </div>

        <!-- Users List -->
        <div class="flex justify-between items-center border-b border-slate-200 pb-2 mb-5">
          <h3 class="text-xl font-bold text-slate-800">Existing Accounts</h3>
          <button id="refresh-btn" class="text-sm text-brand-600 hover:underline font-medium">Refresh</button>
        </div>
        <div id="users-list" class="space-y-3">
          <p class="text-slate-500 italic text-sm">Loading accounts...</p>
        </div>
      </div>
    </div>

    <!-- Edit User Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
      <div class="flex items-center justify-center min-h-screen p-4">
        <div class="fixed inset-0 bg-slate-900 bg-opacity-50 backdrop-blur-sm" id="edit-modal-bg"></div>
        <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md z-10">
          <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
            <h3 class="text-lg font-bold text-slate-900" id="edit-modal-title">Edit Account</h3>
            <button id="edit-modal-close" class="text-slate-400 hover:text-slate-600">✕</button>
          </div>
          <div class="px-6 py-5 space-y-4">
            <input type="hidden" id="edit-user-email" />
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
              <select id="edit-user-role" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none bg-white">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Apps Script URL</label>
              <input type="text" id="edit-user-script" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none" placeholder="https://script.google.com/..." />
            </div>
            <hr class="border-slate-100"/>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Change Password <span class="text-slate-400 font-normal">(leave blank to keep current)</span></label>
              <input type="text" id="edit-user-password" class="w-full p-2.5 border border-slate-300 rounded-lg outline-none" placeholder="New password (min 6 chars)" />
            </div>
          </div>
          <div class="px-6 py-4 bg-slate-50 rounded-b-xl flex gap-3 justify-end border-t border-slate-100">
            <button id="edit-modal-cancel" class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">Cancel</button>
            <button id="edit-modal-save" class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-lg hover:bg-brand-700">Save Changes</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

      const GATE_PASSWORD = "Sirkil.com2013";

      const firebaseConfig = {
        apiKey: "AIzaSyDvGSwwc5-oY49AdPT_G4a_5NmmSnsmbyU",
        authDomain: "sirkil-operation-expenses.firebaseapp.com",
        projectId: "sirkil-operation-expenses",
        storageBucket: "sirkil-operation-expenses.firebasestorage.app",
        messagingSenderId: "76114714089",
        appId: "1:76114714089:web:1da952ab54d984527a3f78"
      };

      const app = initializeApp(firebaseConfig, "UserMgmt");
      const db = getFirestore(app);

      let syncedUsers = [];
      let editingEmail = null;
      let adminToken = null; // We need a token to call the backend API — we'll use the Firebase API key directly

      // ── GATE LOGIC ──────────────────────────────────────────────────────────
      document.getElementById('gate-btn').addEventListener('click', unlock);
      document.getElementById('gate-password').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

      function unlock() {
        const val = document.getElementById('gate-password').value;
        if (val === GATE_PASSWORD) {
          document.getElementById('gate-section').classList.add('hidden');
          document.getElementById('dashboard-section').classList.remove('hidden');
          startListening();
        } else {
          document.getElementById('gate-error').classList.remove('hidden');
          document.getElementById('gate-password').value = '';
        }
      }

      document.getElementById('lock-btn').addEventListener('click', () => {
        document.getElementById('dashboard-section').classList.add('hidden');
        document.getElementById('gate-section').classList.remove('hidden');
        document.getElementById('gate-password').value = '';
      });

      // ── FIRESTORE LISTENER ──────────────────────────────────────────────────
      function startListening() {
        onSnapshot(collection(db, "users"), snapshot => {
          syncedUsers = snapshot.docs.map(d => ({ email: d.id, ...d.data() }));
          renderUsers();
        });
      }

      // ── RENDER USERS ────────────────────────────────────────────────────────
      function renderUsers() {
        const list = document.getElementById('users-list');
        if (syncedUsers.length === 0) {
          list.innerHTML = '<p class="text-slate-500 italic text-sm">No accounts found.</p>';
          return;
        }
        list.innerHTML = '';
        syncedUsers.forEach(u => {
          const isAdmin = u.role === 'Admin';
          const row = document.createElement('div');
          row.className = 'bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-between shadow-sm';
          row.innerHTML = `
            <div class="flex items-center gap-4">
              <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-lg text-slate-600">
                ${(u.name || u.email).charAt(0).toUpperCase()}
              </div>
              <div>
                <div class="font-semibold text-slate-800">${u.name || '—'}</div>
                <div class="text-sm text-slate-500">${u.email}</div>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-xs font-semibold px-2.5 py-1 rounded-full border ${isAdmin ? 'bg-brand-50 text-brand-700 border-brand-200' : 'bg-slate-100 text-slate-600 border-slate-200'}">${u.role || 'User'}</span>
              <button data-email="${u.email}" class="edit-btn text-sm font-medium text-brand-600 hover:text-brand-800 bg-brand-50 border border-brand-200 px-3 py-1.5 rounded-lg transition">Edit</button>
            </div>
          `;
          list.appendChild(row);
        });

        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => openEdit(btn.dataset.email));
        });
      }

      document.getElementById('refresh-btn').addEventListener('click', () => {
        document.getElementById('users-list').innerHTML = '<p class="text-slate-500 italic text-sm">Refreshing...</p>';
      });

      // ── CREATE USER ─────────────────────────────────────────────────────────
      document.getElementById('create-user-btn').addEventListener('click', async () => {
        const name = document.getElementById('new-user-name').value.trim();
        const email = document.getElementById('new-user-email').value.trim();
        const password = document.getElementById('new-user-password').value;
        const role = document.getElementById('new-user-role').value;
        const msg = document.getElementById('create-msg');

        if (!name || !email || !password) {
          showMsg(msg, 'Please fill all fields.', false);
          return;
        }
        if (password.length < 6) {
          showMsg(msg, 'Password must be at least 6 characters.', false);
          return;
        }

        const btn = document.getElementById('create-user-btn');
        btn.disabled = true; btn.textContent = 'Creating...';

        try {
          // Use Firebase Auth REST API to create the user (no server token needed)
          const apiKey = firebaseConfig.apiKey;
          const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, returnSecureToken: false })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);

          // Write to Firestore via our server endpoint
          const fRes = await fetch('/api/users/setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-dashboard-key': GATE_PASSWORD },
            body: JSON.stringify({ email, name, role })
          });
          if (!fRes.ok) throw new Error(await fRes.text());

          showMsg(msg, `✓ Account created! Email: ${email} | Pass: ${password}`, true);
          document.getElementById('new-user-name').value = '';
          document.getElementById('new-user-email').value = '';
          document.getElementById('new-user-password').value = '';
        } catch (e) {
          showMsg(msg, 'Error: ' + e.message, false);
        } finally {
          btn.disabled = false; btn.textContent = 'Create Account';
        }
      });

      // ── EDIT MODAL ──────────────────────────────────────────────────────────
      function openEdit(email) {
        const u = syncedUsers.find(x => x.email === email);
        if (!u) return;
        editingEmail = email;
        document.getElementById('edit-modal-title').textContent = u.name || email;
        document.getElementById('edit-user-email').value = email;
        document.getElementById('edit-user-role').value = u.role || 'User';
        document.getElementById('edit-user-script').value = u.scriptUrl || '';
        document.getElementById('edit-user-password').value = '';
        document.getElementById('edit-modal').classList.remove('hidden');
      }

      function closeEdit() {
        document.getElementById('edit-modal').classList.add('hidden');
        editingEmail = null;
      }

      document.getElementById('edit-modal-close').addEventListener('click', closeEdit);
      document.getElementById('edit-modal-cancel').addEventListener('click', closeEdit);
      document.getElementById('edit-modal-bg').addEventListener('click', closeEdit);

      document.getElementById('edit-modal-save').addEventListener('click', async () => {
        const email = document.getElementById('edit-user-email').value;
        const role = document.getElementById('edit-user-role').value;
        const scriptUrl = document.getElementById('edit-user-script').value.trim();
        const newPassword = document.getElementById('edit-user-password').value;
        const btn = document.getElementById('edit-modal-save');
        btn.disabled = true; btn.textContent = 'Saving...';

        try {
          // Update profile
          const pRes = await fetch('/api/users/setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-dashboard-key': GATE_PASSWORD },
            body: JSON.stringify({ email, role, scriptUrl })
          });
          if (!pRes.ok) throw new Error(await pRes.text());

          // Change password if provided
          if (newPassword) {
            if (newPassword.length < 6) throw new Error('Password must be at least 6 characters.');
            const pwRes = await fetch('/api/users/change-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-dashboard-key': GATE_PASSWORD },
              body: JSON.stringify({ email, newPassword })
            });
            if (!pwRes.ok) throw new Error(await pwRes.text());
          }

          closeEdit();
        } catch(e) {
          alert('Error: ' + e.message);
        } finally {
          btn.disabled = false; btn.textContent = 'Save Changes';
        }
      });

      function showMsg(el, text, success) {
        el.textContent = text;
        el.className = `text-sm mt-1 ${success ? 'text-green-700' : 'text-red-600'}`;
        el.classList.remove('hidden');
        if (success) setTimeout(() => el.classList.add('hidden'), 8000);
      }
    </script>
  </body>
</html>
